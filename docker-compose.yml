version: '3.8'

services:
  web_1:
    build: .
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_HOST=host.docker.internal
      - DATABASE_NAME=hackathon_db
      - DATABASE_USER=hackathon
      - DATABASE_PASSWORD=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
    volumes:
      - ./logs:/app/logs

  web_2:
    build: .
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_HOST=host.docker.internal
      - DATABASE_NAME=hackathon_db
      - DATABASE_USER=hackathon
      - DATABASE_PASSWORD=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
    volumes:
      - ./logs:/app/logs

  nginx:
    image: nginx:latest
    restart: always
    ports:
      # JENKINS EXPORT OVERRIDES THIS DYNAMICALLY
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web_1
      - web_2

  redis:
    image: redis:alpine
    restart: always
