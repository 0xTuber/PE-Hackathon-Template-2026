version: '3.8'

services:
  web_1:
    build: .
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_HOST=host.docker.internal
      - DATABASE_NAME=${DATABASE_NAME:-hackathon_db}
      - DATABASE_USER=${DATABASE_USER:-hackathon}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - REDIS_HOST=${REDIS_HOST:-redis}
    volumes:
      - ./logs:/app/logs

  web_2:
    build: .
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_HOST=host.docker.internal
      - DATABASE_NAME=${DATABASE_NAME:-hackathon_db}
      - DATABASE_USER=${DATABASE_USER:-hackathon}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - REDIS_HOST=${REDIS_HOST:-redis}
    volumes:
      - ./logs:/app/logs

  nginx:
    image: nginx:latest
    restart: always
    ports:
      # JENKINS EXPORT OVERRIDES THIS DYNAMICALLY
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web_1
      - web_2

  redis:
    image: redis:alpine
    restart: always

  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    depends_on:
      - web_1
      - web_2

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=hackathon
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/golden_signals.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:latest
    restart: always
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    depends_on:
      - discord-relay

  discord-relay:
    image: python:3.13-slim
    restart: always
    command: python /app/discord_relay.py
    environment:
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
    volumes:
      - ./scripts/discord_relay.py:/app/discord_relay.py:ro
