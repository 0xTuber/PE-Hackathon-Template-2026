global:
  resolve_timeout: 5m

route:
  receiver: 'discord-alerts'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: 'discord-alerts'
    slack_configs:
      - api_url: 'DISCORD_WEBHOOK_PLACEHOLDER/slack'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔴 ALERT{{ else }}✅ RESOLVED{{ end }}: {{ .CommonLabels.alertname }}'
        text: >-
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ (index .Alerts 0).Annotations.description }}
          *Instances:* {{ len .Alerts }}
