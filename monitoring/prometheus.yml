global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'flask_web_1'
    metrics_path: /prom-metrics
    static_configs:
      - targets: ['web_1:5000']
        labels:
          replica: 'web_1'

  - job_name: 'flask_web_2'
    metrics_path: /prom-metrics
    static_configs:
      - targets: ['web_2:5000']
        labels:
          replica: 'web_2'

  - job_name: 'nginx'
    metrics_path: /nginx_status
    static_configs:
      - targets: ['nginx:80']
